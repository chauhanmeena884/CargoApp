<section class="page-shell">
      <div class="card">
        <h1>Login</h1>
        <form (ngSubmit)="login()">
          <label>
            Username
            <input name="username" [(ngModel)]="username" required />
          </label>
          <label>
            Password
            <input name="password" type="password" [(ngModel)]="password" required />
          </label>
          <button type="submit" [disabled]="loading">Sign in</button>
          <p class="error" @if(error)>{{ error }}</p>
        </form>

        <div class="divider">or</div>

        <button class="secondary" (click)="toggleRegister()">
          {{ registerMode ? 'Back to login' : 'Create a new account' }}
        </button>

        <form @if(registerMode) (ngSubmit)="register()" class="register-form">
          <label>
            Username
            <input name="registerUsername" [(ngModel)]="registerUsername" required />
          </label>
          <label>
            Password
            <input name="registerPassword" type="password" [(ngModel)]="registerPassword" required />
          </label>
          <label>
            Role
            <select name="registerRole" [(ngModel)]="registerRole">
              <option value="CargoManager">Cargo Manager</option>
              <option value="Administrator">Administrator</option>
              <option value="Customer">Customer</option>
              <option value="Employee">Employee</option>
            </select>
          </label>
          <button type="submit" [disabled]="loading">Register</button>
        </form>
      </div>
    </section>
